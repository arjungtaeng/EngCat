name: Weekly league finalize

on:
  schedule:
    # 매주 월요일 00:10 UTC (한국 월요일 09:10) — 지난주 순위 정산
    - cron: '10 0 * * 1'
  workflow_dispatch:

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --omit=dev || npm install --omit=dev
      - name: Finalize weekly league
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/weekly-league.mjs
