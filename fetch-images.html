function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

async function fetchImage(keyword, orientation = 'portrait') {
  const res = await fetch(
    `https://api.pexels.com/v1/search?query=${encodeURIComponent(keyword)}&per_page=1&orientation=${orientation}`,
    { headers: { Authorization: PEXELS_KEY } }
  );
  const data = await res.json();
  return data.photos?.[0]?.src?.large2x || null;
}

async function start(mode = 'all') {
  const btn = document.getElementById('startBtn');
  const sBtn = document.getElementById('sentenceBtn');
  btn.disabled = true;
  sBtn.disabled = true;
  const targetItems = mode === 'sentences' ? items.filter(it => it.table === 'sentences') : items;
  const lines = ['-- Pexels 이미지 URL 업데이트'];
  let ok = 0, fail = 0;

  for (let i = 0; i < targetItems.length; i++) {
    const item = targetItems[i];
    document.getElementById('progress').textContent = `진행 중... ${i+1} / ${targetItems.length}`;
    try {
      const url = await fetchImage(item.keyword, item.orientation || 'portrait');
      if (url) {
        lines.push(`UPDATE ${item.table} SET image_url = '${url}' WHERE id = '${item.id}';`);
        log(`✅ ${item.id}`);
        ok++;
      } else {
        log(`❌ ${item.id} — 결과 없음`);
        fail++;
      }
    } catch(e) {
      log(`❌ ${item.id} — 오류: ${e.message}`);
      fail++;
    }
    await new Promise(r => setTimeout(r, 250));
  }

  document.getElementById('progress').textContent = `완료: ${ok}개 성공, ${fail}개 실패`;
  document.getElementById('sqlOutput').value = lines.join('\n');
  document.getElementById('sql-wrap').style.display = 'block';
}

function copySQL() {
  const ta = document.getElementById('sqlOutput');
  ta.select();
  document.execCommand('copy');
  alert('SQL이 클립보드에 복사됐어요. Supabase SQL 에디터에 붙여넣고 Run 하세요!');
}
