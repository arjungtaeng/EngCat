<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EngCat Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D11; color: #F4F1EB; font-family: system-ui, sans-serif; padding: 40px 24px; min-height: 100vh; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 13px; color: rgba(244,241,235,0.45); margin-bottom: 36px; }
  label { display: block; font-size: 12px; color: rgba(244,241,235,0.5); letter-spacing: 0.5px; margin-bottom: 8px; }
  input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: #1A1A22; border: 1px solid rgba(244,241,235,0.12);
    color: #F4F1EB; font-size: 14px; margin-bottom: 20px;
    font-family: monospace;
  }
  input:focus { outline: none; border-color: #E8B26A; }
  button {
    width: 100%; padding: 16px; border-radius: 14px;
    background: #E8B26A; color: #0D0D11;
    font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  }
  .result {
    margin-top: 20px; padding: 16px; border-radius: 12px;
    font-size: 14px; display: none;
  }
  .result.ok { background: rgba(100,200,100,0.12); border: 1px solid rgba(100,200,100,0.3); color: #6dc87a; }
  .result.err { background: rgba(255,80,80,0.12); border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b; }
  .current { margin-top: 32px; padding: 16px; border-radius: 12px; background: #1A1A22; border: 1px solid rgba(244,241,235,0.08); font-size: 13px; color: rgba(244,241,235,0.5); }
  .current b { color: #E8B26A; }
  .test-btn { margin-top: 12px; padding: 10px 16px; border-radius: 10px; background: #1A1A22; border: 1px solid rgba(244,241,235,0.15); color: #F4F1EB; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<h1>Azure TTS 설정</h1>
<div class="sub">한 번만 저장하면 이 기기에서 계속 사용돼요.</div>

<label>Azure Speech API 키</label>
<input type="text" id="key" placeholder="키를 붙여넣으세요" autocomplete="off" autocorrect="off" spellcheck="false"/>

<label>지역 (기본값: koreacentral)</label>
<input type="text" id="region" value="koreacentral"/>

<button onclick="save()">저장</button>

<div id="result" class="result"></div>

<div class="current" id="current"></div>

<script>
function showCurrent() {
  const key = localStorage.getItem('ec_azure_key');
  const region = localStorage.getItem('ec_azure_region');
  const el = document.getElementById('current');
  if (key) {
    el.innerHTML = `현재 저장된 키: <b>${key.slice(0,8)}…${key.slice(-4)}</b><br>지역: <b>${region || 'koreacentral'}</b><br><button class="test-btn" onclick="testSpeak()">🔊 테스트 듣기</button>`;
  } else {
    el.innerHTML = '저장된 키 없음';
  }
}

function save() {
  const key = document.getElementById('key').value.trim();
  const region = document.getElementById('region').value.trim() || 'koreacentral';
  const result = document.getElementById('result');
  if (!key) {
    result.textContent = '키를 입력해주세요.';
    result.className = 'result err';
    result.style.display = 'block';
    return;
  }
  localStorage.setItem('ec_azure_key', key);
  localStorage.setItem('ec_azure_region', region);
  result.textContent = '저장됐어요! 앱에서 듣기 버튼을 눌러보세요.';
  result.className = 'result ok';
  result.style.display = 'block';
  document.getElementById('key').value = '';
  showCurrent();
}

async function testSpeak() {
  const key = localStorage.getItem('ec_azure_key');
  const region = localStorage.getItem('ec_azure_region') || 'koreacentral';
  const xmlEsc = s => s.replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
  const text = 'My flight has a layover in Tokyo before arriving in Hawaii.';
  try {
    const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='en-US-JennyNeural'>${xmlEsc(text)}</voice></speak>`;
    const res = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method: 'POST',
      headers: {
        'Ocp-Apim-Subscription-Key': key,
        'Content-Type': 'application/ssml+xml',
        'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3',
      },
      body: ssml,
    });
    if (!res.ok) throw new Error(`오류 ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    audio.play();
  } catch(e) {
    alert('테스트 실패: ' + e.message);
  }
}

showCurrent();
</script>
</body>
</html>
