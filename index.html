<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EngCat"/>
<meta name="theme-color" content="#0B0B0E"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/icon-1024.png?v=6"/>
<link rel="apple-touch-icon" href="icons/icon-180.png?v=5"/>
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png?v=5"/>
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png?v=5"/>
<!-- App icon: "Cat" by Icojam, SVG Repo (https://www.svgrepo.com) · CC BY 4.0 -->
<title>EngCat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;700&family=DM+Serif+Display&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #131318; }
  body { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard Variable', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<script>window.ECRealDevice = true;</script>

<script>window.EC_VER = 9;</script>
<script type="text/babel" src="design_references/tokens.jsx?v=9"></script>
<script type="text/babel" src="design_references/icons.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-login.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-onboarding.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-home.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-word-card.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-sentence-card.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-quiz.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-stats.jsx?v=9"></script>
<script type="text/babel" src="design_references/screen-profile.jsx?v=9"></script>

<script type="text/babel" data-presets="react">
  window.ECNav = { go: () => {} };

  function App() {
    const savedUser = (() => { try { return JSON.parse(localStorage.getItem('engcat_user')); } catch(e) { return null; } })();
    const [screen, setScreen] = React.useState(savedUser ? 'home' : 'login');

    React.useEffect(() => {
      window.ECNav.go = setScreen;
    }, []);

    // Lazy map — component functions, not JSX elements.
    // Only the current screen's function is called, preventing crashes from other screens.
    const screenMap = {
      'login':           ECScreenLogin,
      'onboarding':      ECScreenOnboarding,
      'onboarding-goal': ECScreenOnboardingGoal,
      'home':            ECScreenHome,
      'word-card':       ECScreenWordCard,
      'sentence-card':   ECScreenSentenceCard,
      'quiz':            ECScreenQuiz,
      'stats':           ECScreenStats,
      'profile':         ECScreenProfile,
    };

    const Screen = screenMap[screen] || screenMap['home'] || (() => null);

    return (
      <div style={{
        width: '100%', height: '100%',
        background: '#131318',
        paddingTop: 'env(safe-area-inset-top, 0px)',
        paddingBottom: 'env(safe-area-inset-bottom, 0px)',
      }}>
        <Screen />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // 앱이 포그라운드로 돌아올 때 버전 체크 → 새 버전이면 자동 새로고침
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    fetch('version.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => { if (data.v !== window.EC_VER) location.reload(); })
      .catch(() => {});
  });
</script>
</body>
</html>
