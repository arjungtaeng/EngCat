<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EngCat"/>
<meta name="theme-color" content="#0B0B0E"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/icon-1024.png?v=4"/>
<link rel="apple-touch-icon" href="icons/icon-180.png?v=4"/>
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png?v=4"/>
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png?v=4"/>
<!-- App icon: "Cat" by Icojam, SVG Repo (https://www.svgrepo.com) · CC BY 4.0 -->
<title>EngCat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #131318; }
  body { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard Variable', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>window.ECRealDevice = true;</script>

<script type="text/babel" src="design_references/tokens.jsx"></script>
<script type="text/babel" src="design_references/icons.jsx"></script>
<script type="text/babel" src="design_references/screen-login.jsx"></script>
<script type="text/babel" src="design_references/screen-onboarding.jsx"></script>
<script type="text/babel" src="design_references/screen-home.jsx"></script>
<script type="text/babel" src="design_references/screen-word-card.jsx"></script>
<script type="text/babel" src="design_references/screen-sentence-card.jsx"></script>
<script type="text/babel" src="design_references/screen-quiz.jsx"></script>
<script type="text/babel" src="design_references/screen-stats.jsx"></script>
<script type="text/babel" src="design_references/screen-profile.jsx"></script>

<script type="text/babel" data-presets="react">
  window.ECNav = { go: () => {} };

  function App() {
    const savedUser = (() => { try { return JSON.parse(localStorage.getItem('engcat_user')); } catch(e) { return null; } })();
    const [screen, setScreen] = React.useState(savedUser ? 'home' : 'login');

    React.useEffect(() => {
      window.ECNav.go = setScreen;
    }, []);

    // Lazy map — component functions, not JSX elements.
    // Only the current screen's function is called, preventing crashes from other screens.
    const screenMap = {
      'login':           ECScreenLogin,
      'onboarding':      ECScreenOnboarding,
      'onboarding-goal': ECScreenOnboardingGoal,
      'home':            ECScreenHome,
      'word-card':       ECScreenWordCard,
      'sentence-card':   ECScreenSentenceCard,
      'quiz':            ECScreenQuiz,
      'stats':           ECScreenStats,
      'profile':         ECScreenProfile,
    };

    const Screen = screenMap[screen] || screenMap['home'] || (() => null);

    return (
      <div style={{
        width: '100%', height: '100%',
        background: '#131318',
        paddingTop: 'env(safe-area-inset-top, 0px)',
        paddingBottom: 'env(safe-area-inset-bottom, 0px)',
      }}>
        <Screen />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
