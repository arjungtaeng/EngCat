<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EngCat"/>
<meta name="theme-color" content="#0B0B0E"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="icon.svg"/>
<title>EngCat</title>
<script>
  /* apple-touch-icon: canvas로 PNG 생성 (iOS SVG 미지원 대응) */
  (function () {
    var c = document.createElement('canvas');
    c.width = c.height = 512;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#0B0B0E';
    ctx.fillRect(0, 0, 512, 512);
    var grd = ctx.createRadialGradient(280, 175, 0, 280, 175, 340);
    grd.addColorStop(0, 'rgba(232,178,106,0.28)');
    grd.addColorStop(1, 'rgba(232,178,106,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, 512, 512);
    ctx.fillStyle = '#E8B26A';
    ctx.font = 'italic 228px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('EC', 256, 322);
    var link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"/>
<style>
  html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #131318; }
  body { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard Variable', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>window.ECRealDevice = true;</script>

<script type="text/babel" src="design_references/tokens.jsx"></script>
<script type="text/babel" src="design_references/icons.jsx"></script>
<script type="text/babel" src="design_references/screen-onboarding.jsx"></script>
<script type="text/babel" src="design_references/screen-home.jsx"></script>
<script type="text/babel" src="design_references/screen-word-card.jsx"></script>
<script type="text/babel" src="design_references/screen-sentence-card.jsx"></script>
<script type="text/babel" src="design_references/screen-quiz.jsx"></script>
<script type="text/babel" src="design_references/screen-stats.jsx"></script>
<script type="text/babel" src="design_references/screen-profile.jsx"></script>

<script type="text/babel" data-presets="react">
  window.ECNav = { go: () => {} };

  function App() {
    const [screen, setScreen] = React.useState('onboarding');

    React.useEffect(() => {
      window.ECNav.go = setScreen;
    }, []);

    const screens = {
      'onboarding':      <ECScreenOnboarding />,
      'onboarding-goal': <ECScreenOnboardingGoal />,
      'home':            <ECScreenHome />,
      'word-card':       <ECScreenWordCard />,
      'sentence-card':   <ECScreenSentenceCard />,
      'quiz':            <ECScreenQuiz />,
      'stats':           <ECScreenStats />,
      'profile':         <ECScreenProfile />,
    };

    return (
      <div style={{
        width: '100%', height: '100%',
        background: '#131318',
        paddingBottom: 'env(safe-area-inset-bottom, 0px)',
      }}>
        {screens[screen] ?? screens['home']}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
